name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      # default-members is only the `hudcon` CLI/lib; `hudcon-tauri` is built after `npm run build` (see README).
      - name: Build
        run: cargo build --verbose

      - name: Test
        run: cargo test --verbose
